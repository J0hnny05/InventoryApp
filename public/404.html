<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Inventory</title>
  <script>
    // SPA fallback for GitHub Pages.
    // Encodes the requested path into a query string and redirects to index.html,
    // where a matching snippet decodes it back into history.replaceState before
    // the Angular router boots. Pass `pathSegmentsToKeep` = 1 because the app is
    // served from /<repo>/ on github.io (project page).
    (function () {
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
