<section class="auth">
  <div class="auth__card">
    <header class="auth__head">
      <span class="auth__mark" aria-hidden="true">⌬</span>
      <h1 class="auth__title">Create your inventory</h1>
      <p class="auth__subtitle">New accounts are owners — you can invite helpers later.</p>
    </header>

    <form class="auth__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" autocomplete="username" autofocus />
        <mat-hint align="end">3–64 characters</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email (optional)</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="new-password" />
        <mat-hint align="end">at least 6 characters</mat-hint>
      </mat-form-field>

      @if (error()) {
        <div class="auth__error" role="alert">
          <mat-icon aria-hidden="true">error_outline</mat-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="auth__submit"
        [disabled]="busy() || form.invalid"
      >
        @if (busy()) {
          <mat-spinner diameter="20" />
        } @else {
          <span>Create account</span>
        }
      </button>
    </form>

    <footer class="auth__foot">
      <span>Already have an account?</span>
      <a routerLink="/login">Sign in</a>
    </footer>
  </div>
</section>
