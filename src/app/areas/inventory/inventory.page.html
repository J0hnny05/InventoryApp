<section class="invy-page">
  <invy-page-header
    eyebrow="What you own"
    title="Inventory"
    subtitle="Track everything you own — pin the items you reach for most."
  >
    <button matButton="filled" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
      <span>Add item</span>
    </button>
  </invy-page-header>

  <div class="filters">
    <mat-form-field appearance="outline" class="filters__search">
      <mat-icon matPrefix>search</mat-icon>
      <mat-label>Search</mat-label>
      <input
        matInput
        type="search"
        [value]="search()"
        (input)="onSearchInput($event)"
        placeholder="Name, brand, location, tag…"
        autocomplete="off"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="filters__sort">
      <mat-label>Sort</mat-label>
      <mat-select [value]="sort()" (selectionChange)="onSortChange($event.value)">
        <mat-option value="pinned-recent">Pinned, then recent</mat-option>
        <mat-option value="price-desc">Price: high to low</mat-option>
        <mat-option value="price-asc">Price: low to high</mat-option>
        <mat-option value="name-asc">Name (A–Z)</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="cat-chips" role="tablist" aria-label="Category filter">
    <button
      type="button"
      class="invy-chip"
      [class.invy-chip--ghost]="categoryFilter() !== null"
      [class.is-on]="categoryFilter() === null"
      (click)="onCategoryFilter(null)"
    >All</button>
    @for (cat of categories(); track cat.id) {
      <button
        type="button"
        class="invy-chip"
        [class.invy-chip--ghost]="categoryFilter() !== cat.id"
        [class.is-on]="categoryFilter() === cat.id"
        [style.borderColor]="categoryFilter() === cat.id ? (cat.color ?? null) : null"
        (click)="onCategoryFilter(cat.id)"
      >{{ cat.name }}</button>
    }
  </div>

  @if (visibleItems().length === 0) {
    @if (totalOwned() === 0) {
      <invy-empty-state
        icon="inventory_2"
        title="No items yet"
        message="Add the things you own — clothes, books, gadgets, vehicles. You can mark them as sold later and track your profit."
      >
        <button matButton="filled" (click)="openAddDialog()">
          <mat-icon>add</mat-icon>
          <span>Add your first item</span>
        </button>
      </invy-empty-state>
    } @else {
      <invy-empty-state
        icon="search_off"
        title="No items match"
        message="Try clearing the search or category filter."
      >
        <button matButton (click)="clearFilters()">Clear filters</button>
      </invy-empty-state>
    }
  } @else {
    <div class="invy-grid invy-grid--wide">
      @for (it of visibleItems(); track it.id) {
        <invy-item-card
          [item]="it"
          [category]="categoryById(it.categoryId)"
          (pin)="togglePin($event)"
          (use)="recordUse($event)"
          (sell)="openSellDialog($event)"
          (edit)="openEditDialog($event)"
          (remove)="confirmDelete($event)"
        />
      }
    </div>
  }
</section>
